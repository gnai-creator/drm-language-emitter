<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">DRM Language Emitter banner</title>
  <desc id="desc">Abstract relational manifold with directional trajectories and token particles.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="68%" cy="44%" r="70%">
      <stop offset="0%" stop-color="#164e63" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#0f172a" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.92"/>
      <stop offset="44%" stop-color="#14b8a6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="lineHot" x1="0" x2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="55%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="620" fill="url(#bgGlow)"/>
  <rect width="1600" height="620" filter="url(#grain)" opacity="0.45"/>

  <g opacity="0.28" stroke="#38bdf8" stroke-width="1" fill="none">
